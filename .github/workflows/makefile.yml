name: Makefile CI

on:
  push:
    branches: [ "master" ]
    tags:
      - 'v*'
      - '[0-9]+.[0-9]+*'
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-os3:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: debug
            make_flags: ""
            artifact: Dopus5_os3_debug
          - variant: release
            make_flags: "debug=no"
            artifact: Dopus5_os3

    name: build-os3-${{ matrix.variant }}

    steps:
      - uses: actions/checkout@v6

      - name: Build (${{ matrix.variant }})
        run: |
          docker run --rm -v ${{ github.workspace }}:/work sacredbanana/amiga-compiler:m68k-amigaos sh -c "cd /work/source && make os3 release ${{ matrix.make_flags }}"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: releases/Dopus5_*_os3*.lha
          if-no-files-found: error

  release:
    needs: build-os3
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "artifacts/Dopus5_*_os3.lha"
          generateReleaseNotes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}